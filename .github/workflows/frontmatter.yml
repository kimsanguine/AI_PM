name: frontmatter
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install pyyaml
      - name: validate chapter front-matter
        run: python .github/scripts/validate_frontmatter.py
